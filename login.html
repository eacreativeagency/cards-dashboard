<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acceso Restringido — Cardzy</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #070707;
      --surface: rgba(255,255,255,0.04);
      --border:  rgba(255,255,255,0.09);
      --text:    #f0f0f0;
      --muted:   rgba(255,255,255,0.42);
      --orange:  #ff7a3b;
      --red:     #ef4444;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Plus Jakarta Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* ── CANVAS BG ── */
    #particles {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 0;
    }

    /* ── LOGIN CARD ── */
    .login-wrap {
      position: relative; z-index: 10;
      width: 100%; max-width: 400px;
      padding: 16px;
    }

    .login-card {
      background: rgba(12,12,12,0.88);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px 36px;
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      box-shadow: 0 32px 80px rgba(0,0,0,.7);
    }

    /* lock icon + brand */
    .login-header {
      display: flex; flex-direction: column;
      align-items: center; gap: 20px;
      margin-bottom: 36px;
    }

    .lock-icon {
      width: 60px; height: 60px; border-radius: 16px;
      background: linear-gradient(135deg, #ff7a3b, #e05e1e);
      display: grid; place-items: center;
      box-shadow: 0 0 40px rgba(255,122,59,.30);
    }
    .lock-icon svg { width: 28px; height: 28px; }

    .login-brand {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 22px; font-weight: 800;
      letter-spacing: -0.02em;
    }
    .login-brand span { color: var(--orange); }

    .login-sub {
      font-size: 13px; color: var(--muted);
      text-align: center; margin-top: -14px;
    }

    /* restricted badge */
    .badge-restricted {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      background: rgba(239,68,68,0.10);
      border: 1px solid rgba(239,68,68,0.25);
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 12px; font-weight: 600;
      color: #fca5a5;
      letter-spacing: 0.04em;
      margin-bottom: 28px;
    }
    .badge-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--red);
      animation: pulse-red 1.8s ease infinite;
    }
    @keyframes pulse-red {
      0%,100% { opacity: 1; box-shadow: 0 0 0 0 rgba(239,68,68,.5); }
      50%      { opacity: .6; box-shadow: 0 0 0 4px rgba(239,68,68,0); }
    }

    /* form */
    .form-group {
      display: flex; flex-direction: column; gap: 6px;
      margin-bottom: 16px;
    }
    .form-label {
      font-size: 12px; font-weight: 600;
      color: var(--muted); letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .form-input {
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      color: var(--text);
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color .2s;
      width: 100%;
    }
    .form-input::placeholder { color: rgba(255,255,255,0.22); }
    .form-input:focus { border-color: rgba(255,122,59,.55); }
    .form-input.error { border-color: rgba(239,68,68,.7); }

    .error-msg {
      font-size: 12px; color: #fca5a5;
      display: none; margin-top: -10px; margin-bottom: 8px;
    }
    .error-msg.show { display: block; }

    .btn-login {
      width: 100%;
      background: linear-gradient(135deg, #ff7a3b, #e05e1e);
      border: none; border-radius: 10px;
      padding: 13px;
      color: #fff;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 14px; font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.02em;
      margin-top: 8px;
      transition: opacity .15s, transform .15s;
    }
    .btn-login:hover { opacity: .9; transform: translateY(-1px); }
    .btn-login:active { transform: translateY(0); }
    .btn-login:disabled { opacity: .5; cursor: not-allowed; transform: none; }

    /* footer */
    .login-footer {
      margin-top: 28px;
      text-align: center;
      font-size: 11px; color: rgba(255,255,255,0.22);
    }
    .login-footer span { color: var(--orange); }

    /* shake animation for wrong password */
    @keyframes shake {
      0%,100%{ transform: translateX(0); }
      20%    { transform: translateX(-8px); }
      40%    { transform: translateX(8px); }
      60%    { transform: translateX(-5px); }
      80%    { transform: translateX(5px); }
    }
    .shake { animation: shake .4s ease; }
  </style>
</head>
<body>

<div id="particles"></div>

<div class="login-wrap">
  <div class="login-card" id="login-card">

    <div class="login-header">
      <div class="lock-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="3"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
      </div>
      <div>
        <div class="login-brand">Card<span>zy</span></div>
      </div>
    </div>

    <div class="badge-restricted">
      <span class="badge-dot"></span>
      ACCESO RESTRINGIDO
    </div>

    <p class="login-sub" style="margin-bottom:24px;margin-top:0;">Panel privado de gestión de tarjetas digitales.</p>

    <form id="login-form" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label class="form-label">Usuario</label>
        <input id="inp-user" class="form-input" type="text" placeholder="usuario" autocomplete="username" spellcheck="false">
      </div>
      <div class="form-group">
        <label class="form-label">Contraseña</label>
        <input id="inp-pass" class="form-input" type="password" placeholder="••••••••" autocomplete="current-password">
      </div>
      <div class="error-msg" id="err-msg">Usuario o contraseña incorrectos.</div>
      <button class="btn-login" type="submit" id="btn-login">Ingresar al panel →</button>
    </form>

    <div class="login-footer">
      Powered by <span>EA Creative</span> · Cardzy v1.0
    </div>

  </div>
</div>

<script>
// ── CREDENTIALS (change as needed) ──
var CREDENTIALS = [
  { user: 'johan',  pass: 'eacreative2026' },
  { user: 'admin',  pass: 'cardzy2026' }
];

function handleLogin(e) {
  e.preventDefault();
  var user = document.getElementById('inp-user').value.trim().toLowerCase();
  var pass = document.getElementById('inp-pass').value;
  var btn  = document.getElementById('btn-login');
  var err  = document.getElementById('err-msg');

  var match = CREDENTIALS.find(function(c) {
    return c.user === user && c.pass === pass;
  });

  if (match) {
    btn.textContent = '✓ Acceso concedido';
    btn.disabled = true;
    sessionStorage.setItem('cardzy_auth', '1');
    setTimeout(function() {
      window.location.replace('index.html');
    }, 500);
  } else {
    err.classList.add('show');
    document.getElementById('inp-pass').classList.add('error');
    document.getElementById('login-card').classList.add('shake');
    setTimeout(function() {
      document.getElementById('login-card').classList.remove('shake');
    }, 450);
    document.getElementById('inp-pass').value = '';
    document.getElementById('inp-pass').focus();
  }
}

// clear error on typing
document.getElementById('inp-user').addEventListener('input', function() {
  document.getElementById('err-msg').classList.remove('show');
  document.getElementById('inp-pass').classList.remove('error');
});
document.getElementById('inp-pass').addEventListener('input', function() {
  document.getElementById('err-msg').classList.remove('show');
  this.classList.remove('error');
});

// redirect if already logged in
if (sessionStorage.getItem('cardzy_auth')) {
  window.location.replace('index.html');
}
</script>

<!-- Animation Engine (Searchlights) -->
<script>
(function() {
  var canvas = document.createElement('canvas');
  document.getElementById('particles').appendChild(canvas);
  canvas.style.cssText = 'position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:0;';
  var ctx = canvas.getContext('2d');
  var W, H;

  function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
  window.addEventListener('resize', resize);
  resize();

  var t = 0;
  var beams = [
    { ox:.15, phase:0.0, speed:.18, swing:.28, spread:.10 },
    { ox:.40, phase:1.6, speed:.22, swing:.32, spread:.09 },
    { ox:.65, phase:0.8, speed:.15, swing:.26, spread:.11 },
    { ox:.85, phase:2.4, speed:.20, swing:.30, spread:.09 }
  ];

  function loop() {
    ctx.clearRect(0, 0, W, H);
    t += .008;

    beams.forEach(function(b) {
      var ox  = b.ox * W;
      var tip = W * (.5 + Math.sin(t * b.speed + b.phase) * b.swing);
      var r   = b.spread * W;

      // outer halo
      var g1 = ctx.createRadialGradient(tip, 0, 0, tip, 0, r * 3.5);
      g1.addColorStop(0,   'rgba(255,220,170,.038)');
      g1.addColorStop(0.4, 'rgba(255,200,140,.015)');
      g1.addColorStop(1,   'rgba(255,180,120,0)');
      ctx.beginPath(); ctx.moveTo(ox, H);
      ctx.lineTo(tip - r*3.5, 0); ctx.lineTo(tip + r*3.5, 0);
      ctx.closePath(); ctx.fillStyle = g1; ctx.fill();

      // mid beam
      var g2 = ctx.createLinearGradient(ox, H, tip, 0);
      g2.addColorStop(0, 'rgba(255,200,150,0)');
      g2.addColorStop(1, 'rgba(255,210,160,.06)');
      ctx.beginPath(); ctx.moveTo(ox, H);
      ctx.lineTo(tip - r*1.4, 0); ctx.lineTo(tip + r*1.4, 0);
      ctx.closePath(); ctx.fillStyle = g2; ctx.fill();

      // core beam
      var g3 = ctx.createLinearGradient(ox, H, tip, 0);
      g3.addColorStop(0, 'rgba(255,235,200,0)');
      g3.addColorStop(1, 'rgba(255,245,220,.095)');
      ctx.beginPath(); ctx.moveTo(ox, H);
      ctx.lineTo(tip - r*.55, 0); ctx.lineTo(tip + r*.55, 0);
      ctx.closePath(); ctx.fillStyle = g3; ctx.fill();
    });

    requestAnimationFrame(loop);
  }
  loop();
})();
</script>

</body>
</html>
